<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Catálogo de Despieces · ACL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e151d; --panel:#151f2a; --panel-2:#1b2733; --line:#28353f;
    --text:#e8eef4; --muted:#8aa0b3; --faint:#5f7386;
    --accent:#ff9e2c; --accent-2:#3b82f6; --ok:#3ecf8e;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:
      radial-gradient(90% 60% at 100% 0%,rgba(59,130,246,.10),transparent 60%),
      radial-gradient(70% 50% at 0% 100%,rgba(255,158,44,.08),transparent 55%),
      var(--ink);
    color:var(--text);font-family:"Inter",system-ui,Segoe UI,Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;min-height:100dvh}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  .disp{font-family:"Space Grotesk","Inter",sans-serif}
  a{color:inherit;text-decoration:none}

  .wrap{max-width:1080px;margin:0 auto;padding:20px 18px 60px}

  header{display:flex;align-items:center;gap:13px;padding:6px 2px 18px}
  .logo{width:40px;height:40px;border-radius:11px;flex:none;position:relative;
    background:radial-gradient(120% 120% at 30% 20%,#ffb455,#ff9e2c 45%,#c96f00);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25),0 4px 16px rgba(255,158,44,.35)}
  .logo::before,.logo::after{content:"";position:absolute;background:#0e151d;border-radius:2px}
  .logo::before{width:16px;height:2.6px;top:18px;left:8px;box-shadow:0 6px 0 #0e151d,0 -6px 0 #0e151d}
  .logo::after{width:2.6px;height:16px;top:12px;left:27px}
  header h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.2px}
  header p{margin:2px 0 0;font-size:11.5px;color:var(--faint);letter-spacing:1.4px;text-transform:uppercase;font-weight:600}

  .search{margin-left:auto;position:relative;min-width:220px}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:11px;padding:11px 13px 11px 36px;font-size:13px;font-family:inherit}
  .search input:focus{outline:none;border-color:var(--accent)}
  .search input::placeholder{color:var(--faint)}
  .search svg{position:absolute;left:12px;top:12px;width:15px;height:15px;stroke:var(--faint);fill:none}

  /* breadcrumb */
  .crumbs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-bottom:16px}
  .crumbs .c{cursor:pointer;padding:2px 4px;border-radius:5px;transition:.12s;white-space:nowrap}
  .crumbs .c:hover{color:var(--text);background:var(--panel-2)}
  .crumbs .sep{color:var(--faint);user-select:none}
  .crumbs .cur{color:var(--accent);cursor:default;letter-spacing:.5px}
  .crumbs .cur:hover{background:none}
  .crumbs .home{color:var(--text);font-weight:600}

  .levelbar{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:2px 2px 12px}
  .levelbar h2{margin:0;font-family:"Space Grotesk";font-size:15px;font-weight:600;letter-spacing:.3px}
  .levelbar .k{font-size:11px;color:var(--faint);font-family:"JetBrains Mono"}

  /* cards */
  .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .card{display:block;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .card:hover{border-color:#3c4d5c;background:var(--panel-2);transform:translateY(-1px)}
  .card .accent{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .card .top{display:flex;align-items:center;gap:10px}
  .card .ico{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:#0f1a24;border:1px solid var(--line)}
  .card .ico svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.7}
  .card h3{margin:0;font-size:15px;font-weight:600;font-family:"Space Grotesk";line-height:1.2}
  .card .tag{font-size:10.5px;font-family:"JetBrains Mono";color:var(--faint);letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
  .card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:13px}
  .card .cnt{font-size:11.5px;color:var(--muted);font-family:"JetBrains Mono"}
  .card .go{font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:4px}

  .card.machine .ico svg{stroke:var(--accent-2)}
  .card.machine .accent{background:var(--accent-2)}
  .chip{font-size:10.5px;font-weight:600;font-family:"JetBrains Mono";letter-spacing:.4px;
    padding:2px 7px;border-radius:20px;background:#12233a;color:#8fc0ff;border:1px solid #234a6e}
  .card.pending{cursor:not-allowed;opacity:.62}
  .card.pending:hover{transform:none;border-color:var(--line);background:var(--panel)}
  .card.pending .accent{background:#3a4753}
  .card.pending .ico svg{stroke:var(--faint)}
  .badge-pend{font-size:11px;color:var(--faint);font-family:"JetBrains Mono"}

  .path{font-size:11px;color:var(--faint);font-family:"JetBrains Mono";margin-top:8px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .empty{padding:40px 20px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}
  .empty.err{border-color:#7a3b3b;color:#ffb3b3;background:rgba(60,20,20,.25)}
  .empty code{color:var(--accent);font-family:"JetBrains Mono";font-size:12px}

  .hint{margin-top:26px;font-size:12px;color:var(--faint);line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px}
  .hint b{color:var(--muted)}

  @media (max-width:640px){
    .wrap{padding:16px 13px 50px}
    header{flex-wrap:wrap}
    .search{margin-left:0;width:100%;order:3;min-width:0}
    header h1{font-size:17px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"></div>
    <div>
      <h1 class="disp" id="hTitle">Catálogo de Despieces</h1>
      <p id="hSub">ACL · Repuestos por máquina</p>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line></svg>
      <input id="q" type="search" placeholder="Buscar máquina… (ej. llenadora)" autocomplete="off" />
    </div>
  </header>

  <div class="crumbs" id="crumbs"></div>
  <div class="levelbar" id="levelbar" style="display:none">
    <h2 id="levelTitle"></h2><span class="k" id="levelKind"></span>
  </div>

  <div id="content"></div>

  <div class="hint" id="hint">
    Toca una <b>planta</b> para ver sus zonas, luego la <b>línea</b> y la <b>máquina</b>. En la máquina se abre el despiece con los IDs y la leyenda, en modo solo lectura.
  </div>
</div>

<script>
(function(){
  const $=s=>document.querySelector(s);
  const params=new URLSearchParams(location.search);
  const CAT_URL=params.get("catalogo")||"catalogo.json";
  const VIEWER=params.get("visor")||"explosionado.html";

  const ORDER=["plantas","zonas","lineas","maquinas","despieces"];
  const LABELS=["Plantas","Zonas / Áreas","Líneas de embotellado","Máquinas","Despieces / Láminas"];
  const KIND=["planta","zona","línea","máquina","lámina"];
  const ICONS={
    planta:'<path d="M4 20V9l5-3v3l5-3v3l5-3v14z"/><path d="M4 20h16"/>',
    zona:'<rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 12h16M12 4v16"/>',
    "línea":'<path d="M3 12h4l2-5 3 10 2-5h7"/>',
    "máquina":'<circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/>',
    "lámina":'<path d="M12 3l8 4-8 4-8-4z"/><path d="M4 12l8 4 8-4M4 16.5l8 4 8-4"/>'
  };

  let DATA=null, PATH=[], FLAT=[]; // FLAT = all machines with path

  fetch(CAT_URL,{cache:"no-cache"}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(d=>{DATA=d;init();})
    .catch(err=>{
      $("#crumbs").style.display="none";$("#hint").style.display="none";
      $("#content").innerHTML='<div class="empty err">No se pudo cargar el catálogo <code>'+esc(CAT_URL)+'</code>.<br>Verifica que el archivo exista y esté publicado en el mismo sitio.</div>';
    });

  function init(){
    if(DATA.titulo)$("#hTitle").textContent=DATA.titulo.replace(/^ACL\s*·\s*/,"")||"Catálogo de Despieces";
    if(DATA.subtitulo)$("#hSub").textContent=DATA.subtitulo;
    buildFlat();
    $("#q").addEventListener("input",render);
    render();
  }

  // flatten all machines for global search
  function buildFlat(){
    FLAT=[];
    (DATA.plantas||[]).forEach(pl=>(pl.zonas||[]).forEach(zo=>(zo.lineas||[]).forEach(li=>(li.maquinas||[]).forEach(mq=>{
      FLAT.push({mq,path:[pl,zo,li],labels:[pl.nombre,zo.nombre,li.nombre]});
    }))));
  }

  function currentList(){
    if(PATH.length===0)return DATA.plantas||[];
    return PATH[PATH.length-1][ORDER[PATH.length]]||[];
  }
  function childKeyCount(node,depth){
    const key=ORDER[depth+1]; if(!key)return null;
    const arr=node[key]||[];
    // for plantas, count total machines (nicer landing); else direct children
    if(depth===0){
      let m=0;(node.zonas||[]).forEach(z=>(z.lineas||[]).forEach(l=>m+=(l.maquinas||[]).length));
      return {n:m,unit:m===1?"máquina":"máquinas"};
    }
    return {n:arr.length,unit:arr.length===1?KIND[depth+1]:KIND[depth+1]+"s"};
  }

  function render(){
    const q=($("#q").value||"").trim().toLowerCase();
    renderCrumbs(!!q);
    if(q){ renderSearch(q); return; }
    const depth=PATH.length;
    $("#levelbar").style.display="flex";
    $("#levelTitle").textContent=LABELS[depth];
    const list=currentList();
    $("#levelKind").textContent=list.length+" "+(list.length===1?KIND[depth]:KIND[depth]+"s");

    if(!list.length){
      $("#content").innerHTML='<div class="empty">Aún no hay '+LABELS[depth].toLowerCase()+' configuradas aquí.</div>';
      return;
    }
    const g=document.createElement("div");g.className="grid";
    list.forEach(node=>{
      if(depth<3) g.appendChild(nodeCard(node,depth));
      else if(depth===3) g.appendChild(machineCard(node));
      else g.appendChild(despieceCard(node));
    });
    $("#content").innerHTML="";$("#content").appendChild(g);
  }

  function nodeCard(node,depth){
    const kind=KIND[depth];
    const c=document.createElement("div");c.className="card";
    const cnt=childKeyCount(node,depth);
    c.innerHTML=`<span class="accent"></span>
      <div class="top">
        <div class="ico"><svg viewBox="0 0 24 24">${ICONS[kind]}</svg></div>
        <div><h3>${esc(node.nombre)}</h3><div class="tag">${kind}</div></div>
      </div>
      <div class="foot">
        <span class="cnt">${cnt?cnt.n+" "+cnt.unit:""}</span>
        <span class="go">Abrir ›</span>
      </div>`;
    c.onclick=()=>{PATH.push(node);$("#q").value="";render();window.scrollTo({top:0,behavior:"smooth"});};
    return c;
  }

  function machineCard(mq,pathNodes){
    const des=Array.isArray(mq.despieces)?mq.despieces.filter(d=>d&&d.proyecto):[];
    const single=mq.proyecto&&mq.proyecto.trim();
    const has=des.length>0||single;
    const c=document.createElement("div");c.className="card machine"+(has?"":" pending");
    let footRight;
    if(des.length) footRight='<span class="go">'+des.length+" lámina"+(des.length===1?"":"s")+" ›</span>";
    else if(single) footRight='<span class="go">Ver despiece ›</span>';
    else footRight='<span class="badge-pend">Sin despiece aún</span>';
    c.innerHTML=`<span class="accent"></span>
      <div class="top">
        <div class="ico"><svg viewBox="0 0 24 24">${ICONS["máquina"]}</svg></div>
        <div><h3>${esc(mq.nombre)}</h3><div class="tag">máquina${mq.marca?" · "+esc(mq.marca):""}</div></div>
      </div>
      <div class="foot">
        ${mq.marca?`<span class="chip">${esc(mq.marca)}</span>`:'<span></span>'}
        ${footRight}
      </div>`;
    if(des.length){
      c.onclick=()=>{if(pathNodes)PATH=pathNodes.slice();PATH.push(mq);$("#q").value="";render();window.scrollTo({top:0,behavior:"smooth"});};
    }else if(single){
      const url=VIEWER+"?proyecto="+encodeURIComponent(mq.proyecto)+"&cat="+encodeURIComponent(location.pathname.split("/").pop()||"catalogo.html");
      c.onclick=()=>{location.href=url;};
    }
    return c;
  }
  function despieceCard(d){
    const has=d.proyecto&&d.proyecto.trim();
    const tipo=(d.tipo||"").toUpperCase();
    const c=document.createElement("div");c.className="card machine"+(has?"":" pending");
    c.innerHTML=`<span class="accent"></span>
      <div class="top">
        <div class="ico"><svg viewBox="0 0 24 24">${ICONS["lámina"]}</svg></div>
        <div><h3>${esc(d.nombre||"Despiece")}</h3><div class="tag">lámina${tipo?" · "+esc(tipo):""}</div></div>
      </div>
      <div class="foot">
        ${tipo?`<span class="chip">${tipo==="3D"?"3D · STP":"2D · PDF"}</span>`:'<span></span>'}
        ${has?'<span class="go">Abrir ›</span>':'<span class="badge-pend">Pendiente</span>'}
      </div>`;
    if(has){
      const url=VIEWER+"?proyecto="+encodeURIComponent(d.proyecto)+"&cat="+encodeURIComponent(location.pathname.split("/").pop()||"catalogo.html");
      c.onclick=()=>{location.href=url;};
    }
    return c;
  }

  function renderSearch(q){
    $("#levelbar").style.display="flex";
    $("#levelTitle").textContent="Resultados";
    const res=FLAT.filter(f=>(f.mq.nombre||"").toLowerCase().includes(q)||(f.mq.marca||"").toLowerCase().includes(q)||f.labels.join(" ").toLowerCase().includes(q));
    $("#levelKind").textContent=res.length+" "+(res.length===1?"coincidencia":"coincidencias");
    if(!res.length){$("#content").innerHTML='<div class="empty">Sin coincidencias para “'+esc(q)+'”.</div>';return;}
    const g=document.createElement("div");g.className="grid";
    res.forEach(f=>{
      const card=machineCard(f.mq,f.path);
      const path=document.createElement("div");path.className="path";
      path.textContent=f.labels.join("  ›  ");
      card.appendChild(path);
      g.appendChild(card);
    });
    $("#content").innerHTML="";$("#content").appendChild(g);
  }

  function renderCrumbs(searchMode){
    const el=$("#crumbs");el.innerHTML="";
    const home=document.createElement("span");home.className="c home";home.textContent="Plantas";
    home.onclick=()=>{PATH=[];$("#q").value="";render();};
    el.appendChild(home);
    if(searchMode){
      addSep(el);const s=document.createElement("span");s.className="cur";s.textContent="Búsqueda";el.appendChild(s);return;
    }
    PATH.forEach((node,i)=>{
      addSep(el);
      const c=document.createElement("span");
      const last=(i===PATH.length-1);
      c.className=last?"cur":"c";c.textContent=node.nombre;
      if(!last)c.onclick=()=>{PATH=PATH.slice(0,i+1);render();};
      el.appendChild(c);
    });
    if(PATH.length<3){
      addSep(el);const nxt=document.createElement("span");nxt.className="cur";
      nxt.textContent="▸ "+KIND[PATH.length];el.appendChild(nxt);
    }
  }
  function addSep(el){const s=document.createElement("span");s.className="sep";s.textContent="›";el.appendChild(s);}

  function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
})();
</script>
</body>
</html>
